user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"remote_addr":"$remote_addr",'
      '"request_id":"$http_x_request_id"'
    '}';
  access_log /var/log/nginx/access.log json_combined;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css text/xml application/xml application/xml+rss text/javascript;

  upstream frontend_upstream { server frontend:3000; }
  upstream backend_upstream  { server backend:8000; }

  server {
    listen 80;
    server_name _;

    # Generous proxy buffers for Claude streams
    proxy_buffering off;
    proxy_read_timeout 120s;

    location /api/ {
      proxy_pass http://backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      add_header X-Request-ID $upstream_http_x_request_id always;
    }

    location /healthz {
      proxy_pass http://backend_upstream/healthz;
    }

    location /_next/ {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
